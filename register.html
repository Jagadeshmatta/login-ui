<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Figtree:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #0e0f1a;
      --card:   rgba(255,255,255,.055);
      --border: rgba(255,255,255,.10);
      --lav:    #b49dff;
      --mint:   #7ef5c8;
      --sky:    #7dd3fc;
      --text:   #e8e6f0;
      --muted:  rgba(232,230,240,.45);
      --inp-bg: rgba(255,255,255,.06);
      --err:    #ff8080;
      --ok:     #7ef5c8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: var(--bg); font-family: 'Figtree', sans-serif; color: var(--text); overflow-x: hidden; }

    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; animation: drift 14s ease-in-out infinite alternate; }
    .orb-1 { width: 460px; height: 460px; background: rgba(126,245,200,.15); top: -120px; right: -100px; }
    .orb-2 { width: 380px; height: 380px; background: rgba(180,157,255,.13); bottom: -100px; left: -80px; animation-delay: -5s; }
    .orb-3 { width: 260px; height: 260px; background: rgba(125,211,252,.10); top: 30%; left: 8%; animation-delay: -9s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.08); } }

    /* NAV */
    .nav-bar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: rgba(14,15,26,.7); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: -.4px; background: linear-gradient(120deg, var(--lav), var(--mint)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; gap: 1.8rem; align-items: center; }
    .nav-links a { color: var(--muted); font-size: .88rem; text-decoration: none; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links .nav-cta { background: linear-gradient(120deg, var(--lav), var(--mint)); color: #0e0f1a !important; padding: .38rem 1rem; border-radius: 8px; font-weight: 600; font-size: .84rem; transition: opacity .2s !important; }
    .nav-links .nav-cta:hover { opacity: .85; }
    .hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; }
    @media(max-width:600px) { .nav-links { display: none; } .hamburger { display: block; } }
    #mobileMenu { display: none; background: rgba(14,15,26,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: .6rem 1.6rem 1rem; }
    #mobileMenu.open { display: block; }
    #mobileMenu a { display: block; padding: .55rem 0; color: var(--muted); font-size: .9rem; text-decoration: none; }

    .page-wrap { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 61px); padding: 3rem 1rem; }

    /* CARD */
    .auth-card { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 22px; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); padding: 2.4rem 2.2rem 2.8rem; box-shadow: 0 30px 70px rgba(0,0,0,.45); animation: rise .5s cubic-bezier(.22,.8,.4,1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(36px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .panel-title { font-family: 'Outfit', sans-serif; font-size: 1.7rem; font-weight: 700; margin-bottom: .25rem; background: linear-gradient(120deg, var(--mint) 10%, var(--lav)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .panel-sub { font-size: .86rem; color: var(--muted); margin-bottom: 2rem; font-weight: 300; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: .78rem; font-weight: 500; color: var(--muted); margin-bottom: .38rem; letter-spacing: .5px; text-transform: uppercase; }
    .inp-wrap { position: relative; }
    .inp-wrap .ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; transition: stroke .2s; }
    .inp-wrap input { width: 100%; padding: .74rem 2.6rem .74rem 2.5rem; background: var(--inp-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Figtree', sans-serif; font-size: .93rem; outline: none; transition: border-color .2s, box-shadow .2s, background .2s; }
    .inp-wrap input::placeholder { color: rgba(232,230,240,.22); }
    .inp-wrap input:focus { border-color: var(--lav); box-shadow: 0 0 0 3px rgba(180,157,255,.15); background: rgba(255,255,255,.08); }
    .inp-wrap input.ok  { border-color: var(--ok); }
    .inp-wrap input.bad { border-color: var(--err); }
    .eye { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); cursor: pointer; }
    .eye svg { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; transition: stroke .2s; }
    .eye:hover svg { stroke: var(--lav); }

    .msg { font-size: .76rem; margin-top: .3rem; min-height: .9rem; color: var(--err); display: none; }
    .msg.show { display: block; }
    .msg.ok   { color: var(--ok); }

    .str-bar  { height: 3px; background: rgba(255,255,255,.08); border-radius: 3px; margin-top: .45rem; overflow: hidden; }
    .str-fill { height: 100%; width: 0; border-radius: 3px; transition: width .4s, background .4s; }

    .terms-row { font-size: .8rem; color: var(--muted); margin-bottom: 1.2rem; display: flex; align-items: flex-start; gap: .45rem; }
    .terms-row input { accent-color: var(--lav); width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; }
    .terms-row a { color: var(--lav); text-decoration: none; }

    .btn-submit { width: 100%; padding: .82rem; background: linear-gradient(120deg, var(--mint), var(--lav)); border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: .97rem; color: #0e0f1a; cursor: pointer; transition: opacity .2s, transform .15s, box-shadow .25s; position: relative; overflow: hidden; }
    .btn-submit:hover  { opacity: .88; box-shadow: 0 8px 28px rgba(126,245,200,.25); }
    .btn-submit:active { transform: scale(.98); }
    .ripple { position: absolute; border-radius: 50%; background: rgba(14,15,26,.25); transform: scale(0); animation: rpl .5s linear; pointer-events: none; }
    @keyframes rpl { to { transform: scale(4); opacity: 0; } }

    .divider { display: flex; align-items: center; gap: .8rem; margin: 1.4rem 0; font-size: .78rem; color: var(--muted); }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
    .btn-social { display: flex; align-items: center; justify-content: center; gap: .45rem; padding: .62rem; background: var(--inp-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Figtree', sans-serif; font-size: .82rem; font-weight: 500; cursor: pointer; transition: border-color .2s, background .2s, transform .15s; }
    .btn-social:hover { border-color: var(--mint); background: rgba(126,245,200,.07); transform: translateY(-2px); }
    .btn-social img { width: 17px; height: 17px; }

    .switch-link { text-align: center; margin-top: 1.5rem; font-size: .84rem; color: var(--muted); }
    .switch-link a { color: var(--lav); text-decoration: none; font-weight: 500; }
    .switch-link a:hover { color: var(--mint); }

    #toast { position: fixed; bottom: 1.4rem; right: 1.4rem; z-index: 999; padding: .8rem 1.3rem; background: rgba(20,20,35,.92); border: 1px solid var(--mint); border-radius: 12px; font-size: .88rem; color: var(--text); backdrop-filter: blur(12px); box-shadow: 0 8px 30px rgba(0,0,0,.4); opacity: 0; pointer-events: none; transform: translateY(10px); transition: opacity .3s, transform .3s; }
    #toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .footer { position: relative; z-index: 1; text-align: center; padding: 1rem; font-size: .78rem; color: var(--muted); border-top: 1px solid var(--border); }

    @media(max-width:480px) { .auth-card { padding: 1.8rem 1.3rem 2rem; } .social-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav class="nav-bar">
  <a href="index.html" class="nav-logo">space ✦</a>
  <div class="nav-links">
    <a href="#">home</a>
    <a href="#">explore</a>
    <a href="#">about</a>
    <a href="index.html" class="nav-cta">sign in</a>
  </div>
  <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')">☰</button>
</nav>
<div id="mobileMenu">
  <a href="#">home</a>
  <a href="#">explore</a>
  <a href="#">about</a>
  <a href="index.html">sign in</a>
</div>

<div class="page-wrap">
  <div class="auth-card">
    <p class="panel-title">create account</p>
    <p class="panel-sub">let's get you set up ✦</p>

    <div class="row g-2 mb-1">
      <div class="col-6">
        <div class="field mb-0">
          <label>first name</label>
          <div class="inp-wrap">
            <input type="text" id="rFirst" placeholder="first"/>
            <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="msg" id="rFirstMsg"></div>
        </div>
      </div>
      <div class="col-6">
        <div class="field mb-0">
          <label>last name</label>
          <div class="inp-wrap">
            <input type="text" id="rLast" placeholder="last"/>
            <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="msg" id="rLastMsg"></div>
        </div>
      </div>
    </div>

    <div class="field mt-3">
      <label>email</label>
      <div class="inp-wrap">
        <input type="email" id="rEmail" placeholder="you@somewhere.com" oninput="ajaxEmail(this)"/>
        <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      </div>
      <div class="msg" id="rEmailMsg"></div>
    </div>

    <div class="field">
      <label>password</label>
      <div class="inp-wrap">
        <input type="password" id="rPw" placeholder="min 8 characters" oninput="strength(this.value)" autocomplete="new-password"/>
        <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span class="eye" id="eyeRp" onclick="togglePw('rPw','eyeRp')">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
      <div class="str-bar"><div class="str-fill" id="strFill"></div></div>
      <div class="msg" id="rPwMsg"></div>
    </div>

    <div class="field">
      <label>confirm password</label>
      <div class="inp-wrap">
        <input type="password" id="rCf" placeholder="repeat it" autocomplete="new-password"/>
        <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span class="eye" id="eyeCf" onclick="togglePw('rCf','eyeCf')">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
      <div class="msg" id="rCfMsg"></div>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="terms"/>
      <span>I agree to the <a href="#">Terms & Privacy Policy</a></span>
    </div>
    <div class="msg" id="rTermsMsg" style="margin-top:-.7rem;margin-bottom:.8rem"></div>

    <button class="btn-submit" onclick="doRegister(event)">create account</button>

    <div class="divider">or sign up with</div>
    <div class="social-row">
      <button class="btn-social"><img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="G"/>Google</button>
      <button class="btn-social">
  <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GH" style="width:17px;height:17px;filter:invert(1)"/>
  GitHub
</button>
    </div>

    <p class="switch-link">already have an account? <a href="index.html">sign in →</a></p>
  </div>
</div>

<footer class="footer">made with chill · © 2024</footer>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePw(id, eyeId) {
    const i = document.getElementById(id);
    i.type = i.type === 'password' ? 'text' : 'password';
    document.querySelector('#' + eyeId + ' svg').style.opacity = i.type === 'text' ? '.45' : '1';
  }
  function strength(v) {
    let s = 0;
    if (v.length >= 8) s++; if (/[A-Z]/.test(v)) s++; if (/\d/.test(v)) s++; if (/[^A-Za-z0-9]/.test(v)) s++;
    const w = ['0%','28%','55%','78%','100%'][s];
    const c = ['','#ff8080','#f0a030','#7dd3fc','#7ef5c8'][s];
    document.getElementById('strFill').style.cssText = `width:${w};background:${c}`;
  }
  const taken = ['taken@mail.com','hello@world.com'];
  let eTimer;
  function ajaxEmail(inp) {
    clearTimeout(eTimer);
    const m = document.getElementById('rEmailMsg');
    eTimer = setTimeout(() => {
      const v = inp.value.trim();
      if (!v) return;
      setTimeout(() => {
        if (taken.includes(v.toLowerCase())) { show(m,'email already taken','bad'); inp.className = 'bad'; }
        else if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { show(m,'✓ looks good!','ok'); inp.className = 'ok'; }
      }, 400);
    }, 550);
  }
  function show(el, txt, type) { el.textContent = txt; el.className = 'msg show' + (type === 'ok' ? ' ok' : ''); }
  function clr(el) { el.className = 'msg'; el.textContent = ''; }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show';
    setTimeout(() => t.className = '', 3000);
  }
  document.querySelectorAll('.btn-submit').forEach(b => {
    b.addEventListener('click', e => {
      const r = document.createElement('span'); r.className = 'ripple';
      const d = Math.max(b.clientWidth, b.clientHeight);
      r.style.cssText = `width:${d}px;height:${d}px;left:${e.offsetX - d/2}px;top:${e.offsetY - d/2}px`;
      b.appendChild(r); setTimeout(() => r.remove(), 500);
    });
  });
  function doRegister() {
    let ok = true;
    [['rFirst','rFirstMsg','first name'],['rLast','rLastMsg','last name']].forEach(([id, m, lbl]) => {
      const inp = document.getElementById(id), msg = document.getElementById(m);
      clr(msg); inp.className = '';
      if (!inp.value.trim()) { show(msg, lbl + ' is required'); inp.className = 'bad'; ok = false; } else inp.className = 'ok';
    });
    const em = document.getElementById('rEmail'), emM = document.getElementById('rEmailMsg');
    if (em.className !== 'ok') {
      if (!em.value.trim()) { clr(emM); show(emM, 'email is required'); em.className = 'bad'; ok = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value.trim())) { show(emM, 'enter a valid email'); em.className = 'bad'; ok = false; }
      else if (taken.includes(em.value.trim().toLowerCase())) { show(emM, 'email already taken'); em.className = 'bad'; ok = false; }
    } else if (em.className === 'bad') ok = false;
    const pw = document.getElementById('rPw'), pwM = document.getElementById('rPwMsg');
    clr(pwM); pw.className = '';
    if (pw.value.length < 8) { show(pwM, 'at least 8 characters'); pw.className = 'bad'; ok = false; } else pw.className = 'ok';
    const cf = document.getElementById('rCf'), cfM = document.getElementById('rCfMsg');
    clr(cfM); cf.className = '';
    if (!cf.value) { show(cfM, 'confirm your password'); cf.className = 'bad'; ok = false; }
    else if (cf.value !== pw.value) { show(cfM, "passwords don't match"); cf.className = 'bad'; ok = false; }
    else cf.className = 'ok';
    const tM = document.getElementById('rTermsMsg'); clr(tM);
    if (!document.getElementById('terms').checked) { show(tM, 'please accept the terms'); ok = false; }
    if (ok) toast("✦ account created — you're in!");
  }
</script>
</body>
</html>
